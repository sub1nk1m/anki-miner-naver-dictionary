<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>네이버 사전 (Anki) 설정</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; line-height: 1.6; }
        .group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background: #00c73c; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #00b035; }
        .fetch-btn { background: #2b78e4; padding: 6px 10px; font-size: 14px; margin-top: 5px; }
        .fetch-btn:hover { background: #1c5ead; }
        select { width: 100%; padding: 8px; box-sizing: border-box; }
        #status { margin-top: 10px; color: #00c73c; display: none; }
    </style>
</head>
<body>
    <h1>확장 프로그램 환경설정</h1>
    
    <div class="group">
        <label for="dictLanguage">대상 사전 언어</label>
        <select id="dictLanguage">
            <option value="ja">일본어 (네이버 일본어사전)</option>
            <option value="en">영어 (네이버 영어사전)</option>
            <option value="zh">중국어 (네이버 중국어사전)</option>
            <option value="fr">프랑스어 (네이버 프랑스어사전)</option>
        </select>
    </div>

    <div class="group">
        <label for="ankiUrl">AnkiConnect 주소</label>
        <input type="text" id="ankiUrl" value="http://127.0.0.1:8765">
        <button id="fetchAnkiBtn" class="fetch-btn">↻ 덱 및 모델 불러오기</button>
        <small style="display:block;margin-top:5px;">Anki 프로그램과 AnkiConnect 애드온이 실행 중인지 확인하세요.</small>
    </div>

    <div class="group">
        <label for="deckName">저장할 Anki 덱 검색</label>
        <select id="deckName">
            <option value="Default">Default</option>
        </select>
    </div>

    <div class="group">
        <label for="modelName">대상 노트 타입 (모델 명)</label>
        <select id="modelName">
            <option value="Basic">Basic</option>
        </select>
    </div>

    <hr>
    <hr>
    <h3>필드 매핑</h3>
    <small>Anki 노트 타입과 정확히 일치하는 필드 이름을 선택하세요.</small>

    <div class="group">
        <label for="fieldWord">단어 필드 (예: Front, Expression)</label>
        <select id="fieldWord"><option value="">-- 불러오는 중 --</option></select>
    </div>

    <div class="group">
        <label for="fieldReading">발음/요미가나 필드 (예: Reading - 선택 사항)</label>
        <select id="fieldReading"><option value="">-- 불러오는 중 --</option></select>
    </div>

    <div class="group">
        <label for="fieldMeaning">뜻 필드 (예: Back, Meaning)</label>
        <select id="fieldMeaning"><option value="">-- 불러오는 중 --</option></select>
    </div>

    <div class="group">
        <label for="fieldAudio">오디오 필드 (예: Audio - 선택 사항)</label>
        <select id="fieldAudio"><option value="">-- 불러오는 중 --</option></select>
    </div>

    <div class="group">
        <label for="fieldExample">예문 필드 (예: Example - 선택 사항)</label>
        <select id="fieldExample"><option value="">-- 불러오는 중 --</option></select>
    </div>

    <button id="saveBtn">설정 저장</button>
    <div id="status">설정이 성공적으로 저장되었습니다.</div>

    <script src="options.js"></script>
</body>
</html>
